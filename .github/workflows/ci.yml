name: tests

on:
  push:
    branches: [main]
  pull_request: {}
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run offline test suite (stdlib only)
        run: |
          for t in normalize reconcile elo poisson standings bracket simulator; do
            python3 "tests/test_$t.py"
          done
